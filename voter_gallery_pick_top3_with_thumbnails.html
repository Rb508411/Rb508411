<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบโหวต Top 3 Popular Vote พร้อมแสดงภาพย่อ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f6f8;
            color: #333;
            margin: 0;
            padding: 0;
            padding-bottom: 160px; /* เพิ่มพื้นที่ด้านล่างเพื่อไม่ให้แถบโหวตบังผลงาน */
        }
        header {
            background: linear-gradient(135deg, #8e44ad, #9b59b6);
            color: white;
            text-align: center;
            padding: 40px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        header h1 { margin: 0; font-size: 2.2rem; font-weight: bold; }
        header p { margin: 10px 0 0 0; font-size: 1.1rem; color: #f4ecf7; }
        
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }
        .gallery-item {
            background-color: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.3s, border-color 0.3s;
            border: 3px solid transparent;
            display: flex;
            flex-direction: column;
        }
        .gallery-item.selected {
            border-color: #9b59b6;
            box-shadow: 0 8px 20px rgba(155, 89, 182, 0.3);
            transform: translateY(-5px);
        }
        .image-container {
            width: 100%;
            height: 220px;
            background-color: #eaeded;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #95a5a6;
            position: relative;
        }
        .image-container img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
        .item-info {
            padding: 15px;
            text-align: center;
            flex-grow: 1;
        }
        .item-code { font-size: 1.3rem; font-weight: bold; color: #2c3e50; }
        
        .select-btn {
            display: block;
            width: 100%;
            background-color: #ecf0f1;
            color: #2c3e50;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
        }
        .select-btn:hover { background-color: #bdc3c7; }
        .gallery-item.selected .select-btn {
            background-color: #e74c3c;
            color: white;
        }

        /* Sticky Footer Box (แถบโหวตด้านล่าง) */
        .sticky-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #ffffff;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.15);
            padding: 15px 20px;
            box-sizing: border-box;
            z-index: 1000;
            border-top: 4px solid #9b59b6;
        }
        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }
        .slots-container {
            display: flex;
            gap: 15px;
            flex-grow: 1;
            justify-content: center;
        }
        
        /* กล่องลำดับแต่ละช่อง */
        .slot {
            border: 2px dashed #bdc3c7;
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: bold;
            color: #7f8c8d;
            width: 110px;
            height: 125px;
            background: #f8f9fa;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            transition: all 0.3s;
        }
        .slot.filled {
            border-style: solid;
            border-color: #9b59b6;
            background: #f4ecf7;
            color: #8e44ad;
        }
        
        /* ตัวอย่างภาพที่ยกมาแสดงด้านล่าง */
        .thumb-container {
            width: 100%;
            height: 70px;
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            margin-top: 5px;
            background: #e5e7eb;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .thumb-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .thumb-code {
            font-size: 0.7rem;
            background: rgba(142, 68, 173, 0.9);
            color: white;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 2px 0;
            font-weight: bold;
        }
        .empty-text {
            margin-auto: auto;
            color: #bdc3c7;
            font-size: 0.9rem;
            padding-top: 20px;
        }
        
        .submit-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
        }
        .submit-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            box-shadow: none;
        }
        .submit-btn:hover:not(:disabled) {
            background-color: #27ae60;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .slots-container { gap: 8px; width: 100%; }
            .slot { width: 31%; height: 115px; font-size: 0.75rem; }
            .thumb-container { height: 55px; }
            .submit-btn { width: 100%; padding: 12px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🏆 โหวต Popular Vote (Top 3)</h1>
        <p>กรุณาเลือกภาพที่ท่านประทับใจที่สุด จำนวน 3 อันดับ (ภาพย่อจะแสดงในแถบด้านล่างทันที)</p>
    </header>

    <div class="container">
        <div class="gallery-grid" id="gallery">
            <!-- สร้างโดย JavaScript -->
        </div>
    </div>

    <!-- แถบเลือกโหวตด้านล่างสุด -->
    <div class="sticky-footer">
        <div class="footer-content">
            <div class="slots-container">
                <div class="slot" id="slot-1">
                    <span>อันดับ 1 (3 บ.)</span>
                    <div class="val" style="width:100%;"><div class="empty-text">- ว่าง -</div></div>
                </div>
                <div class="slot" id="slot-2">
                    <span>อันดับ 2 (2 บ.)</span>
                    <div class="val" style="width:100%;"><div class="empty-text">- ว่าง -</div></div>
                </div>
                <div class="slot" id="slot-3">
                    <span>อันดับ 3 (1 บ.)</span>
                    <div class="val" style="width:100%;"><div class="empty-text">- ว่าง -</div></div>
                </div>
            </div>
            <button class="submit-btn" id="submit-btn" disabled onclick="submitVotes()">ยืนยันการโหวตทั้ง 3 อันดับ</button>
        </div>
    </div>

    <script>
        // *** ให้นำ URL ของ Google Apps Script มาใส่ตรงนี้ ***
        const SCRIPT_URL = "ใส่_URL_ของ_Google_Apps_Script_ที่นี่";
        
        let selectedItems = [];

        // จำลองสร้างผลงานภาพ 40 ภาพ
        const gallery = document.getElementById('gallery');
        for (let i = 1; i <= 40; i++) {
            let imgCode = `IMG_${i.toString().padStart(3, '0')}`;
            
            // คุณสามารถเปลี่ยนลิงก์รูปภาพจริงตรงนี้ เช่น "images/" + imgCode + ".jpg"
            let mockImgUrl = "ใส่ลิงก์รูปภาพผลงานที่นี่"; 
            
            gallery.innerHTML += `
                <div class="gallery-item" id="card-${imgCode}">
                    <div class="image-container">
                        <img src="${mockImgUrl}" alt="${imgCode}" onerror="this.style.display='none';">
                        <span>🖼️ ภาพผลงาน ${imgCode}</span>
                    </div>
                    <div class="item-info">
                        <div class="item-code">${imgCode}</div>
                        <button class="select-btn" onclick="toggleSelection('${imgCode}')">➕ เลือกภาพนี้</button>
                    </div>
                </div>
            `;
        }

        function toggleSelection(imgCode) {
            const card = document.getElementById(`card-${imgCode}`);
            const btn = card.querySelector('.select-btn');
            const index = selectedItems.indexOf(imgCode);

            if (index > -1) {
                // กรณีกดยกเลิก
                selectedItems.splice(index, 1);
                card.classList.remove('selected');
                btn.innerText = "➕ เลือกภาพนี้";
            } else {
                // กรณีเลือกภาพใหม่
                if (selectedItems.length >= 3) {
                    alert('ท่านเลือกครบ 3 อันดับแล้ว หากต้องการเปลี่ยนชิ้นงาน กรุณากดยกเลิกภาพเดิมก่อนครับ');
                    return;
                }
                selectedItems.push(imgCode);
                card.classList.add('selected');
                btn.innerText = "❌ ยกเลิกการเลือก";
            }
            updateSlots();
        }

        function updateSlots() {
            for (let i = 1; i <= 3; i++) {
                const slot = document.getElementById(`slot-${i}`);
                const valDiv = slot.querySelector('.val');
                const imgCode = selectedItems[i - 1];

                if (imgCode) {
                    slot.classList.add('filled');
                    // ดึงลิงก์รูปภาพจากภาพที่กดเลือกในแกลเลอรีโดยตรงมาแสดง
                    const galleryImg = document.getElementById(`card-${imgCode}`).querySelector('img');
                    const imgSrc = galleryImg.src;
                    
                    valDiv.innerHTML = `
                        <div class="thumb-container">
                            <img src="${imgSrc}" style="${galleryImg.style.display === 'none' ? 'display:none;' : ''}">
                            <div class="thumb-code">${imgCode}</div>
                        </div>
                    `;
                } else {
                    slot.classList.remove('filled');
                    valDiv.innerHTML = "<div class='empty-text'>- ว่าง -</div>";
                }
            }
            
            // เปิดให้กดปุ่มส่งคะแนนเมื่อโหวตครบ 3 ลำดับ
            const submitBtn = document.getElementById('submit-btn');
            if (selectedItems.length === 3) {
                submitBtn.disabled = false;
            } else {
                submitBtn.disabled = true;
            }
        }

        function submitVotes() {
            if (selectedItems.length < 3) {
                alert("กรุณาเลือกให้ครบ 3 อันดับก่อนยืนยันครับ");
                return;
            }
            if (localStorage.getItem('hasVotedTop3')) {
                alert('ขออภัย คุณได้ทำการโหวตไปแล้วครับ 🙏');
                return;
            }

            const btn = document.getElementById('submit-btn');
            btn.innerText = "⏳ กำลังบันทึกคะแนน...";
            btn.disabled = true;

            const url = `${SCRIPT_URL}?rank1=${selectedItems[0]}&rank2=${selectedItems[1]}&rank3=${selectedItems[2]}`;

            fetch(url, { method: 'GET', mode: 'no-cors' })
            .then(() => {
                alert("✅ ระบบบันทึกคะแนนโหวตของคุณเรียบร้อยแล้ว ขอบคุณครับ!");
                localStorage.setItem('hasVotedTop3', 'true');
                btn.innerText = "✅ โหวตเรียบร้อยแล้ว";
                
                // ล็อกปุ่มทั้งหมดหลังจากโหวตเสร็จ
                document.querySelectorAll('.select-btn').forEach(b => {
                    b.disabled = true;
                    if(!b.parentElement.parentElement.classList.contains('selected')){
                        b.innerText = "🔒 ปิดโหวต";
                    }
                });
            }).catch(error => {
                alert("เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง");
                btn.innerText = "ยืนยันการโหวตทั้ง 3 อันดับ";
                btn.disabled = false;
            });
        }
        
        // ตรวจสอบสิทธิ์เครื่องเดิมว่าเคยโหวตไปแล้วหรือไม่ตอนเปิดหน้าเว็บ
        window.onload = function() {
            if(localStorage.getItem('hasVotedTop3')) {
                document.getElementById('submit-btn').innerText = "✅ ท่านได้โหวตเรียบร้อยแล้ว";
                document.getElementById('submit-btn').disabled = true;
                document.querySelectorAll('.select-btn').forEach(b => {
                    b.disabled = true;
                    b.innerText = "🔒 ท่านโหวตแล้ว";
                });
            }
        };
    </script>
</body>
</html>
