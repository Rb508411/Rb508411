<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive PGx Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 1200px; margin: auto; }
        
        h1 { color: #1f3864; border-bottom: 2px solid #1f3864; padding-bottom: 10px; }
        .patient-info { display: flex; flex-wrap: wrap; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 30px; border-left: 5px solid #1f3864; }
        .patient-info div { width: 50%; padding: 5px 0; font-size: 15px; }
        
        .category-header { margin-top: 40px; margin-bottom: 15px; color: #1f3864; font-size: 22px; border-bottom: 2px solid #e1e5eb; padding-bottom: 8px; }
        .grid { display: flex; flex-wrap: wrap; gap: 15px; }
        
        .drug-tile { 
            background: #ffffff; padding: 15px 25px; border-radius: 30px; 
            font-weight: bold; color: #1f3864; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: all 0.2s ease;
            border: 2px solid transparent; user-select: none;
        }
        .drug-tile:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); border-color: #1f3864; }
        
        .drug-tile.dynamic-alert { 
            background-color: var(--alert-color) !important; 
            color: #ffffff !important; 
            border: 2px solid var(--alert-color); 
        }
        .drug-tile.dynamic-alert:hover { filter: brightness(85%); box-shadow: 0 6px 12px rgba(0,0,0,0.25); }

        /* --- MODAL CSS --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 2000; align-items: center; justify-content: center;
            backdrop-filter: blur(3px);
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #ffffff; width: 90%; max-width: 600px; border-radius: 12px;
            padding: 30px; box-shadow: 0 15px 30px rgba(0,0,0,0.3); position: relative;
            border-top: 8px solid #1f3864; max-height: 90vh; overflow-y: auto;
        }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 28px; cursor: pointer; color: #888; line-height: 1; }
        .modal-close:hover { color: #111; }
        .modal-title { font-size: 26px; font-weight: bold; color: #1f3864; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .modal-section { margin-bottom: 15px; }
        .modal-label { font-size: 12px; color: #888; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; margin-bottom: 4px; }
        .modal-data { font-size: 16px; color: #222; }
        .modal-recommendation { background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 5px solid #1f3864; font-size: 16px; line-height: 1.5; }

        /* --- SUMMARY TABLE CSS --- */
        .summary-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-radius: 8px; overflow: hidden; }
        .summary-table th, .summary-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e1e5eb; }
        .summary-table th { background-color: #1f3864; color: #ffffff; font-weight: 600; text-transform: uppercase; font-size: 13px; }
        .summary-table tr:last-child td { border-bottom: none; }
        .summary-table tr:hover { background-color: #f8f9fa; }

        @media (max-width: 600px) {
        .grid { grid-template-columns: 1fr; }
        .patient-info div { width: 100%; } /* Stacks patient info rows */
        .modal-content { width: 95% !important; padding: 15px !important; }
        }

        @media (min-width: 601px) and (max-width: 900px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }

    </style>
</head>

        document.addEventListener("DOMContentLoaded", () => {
            // Modal Elements
            const modalOverlay = document.getElementById('modal-overlay');
            const modalBody = document.getElementById('modal-body');
            const modalContent = document.getElementById('modal-content');
            
            document.getElementById('modal-close').addEventListener('click', () => modalOverlay.classList.remove('active'));
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) modalOverlay.classList.remove('active');
            });

            // 1. Populate Patient Information
            document.getElementById('ui-name').innerText = dashboardData.patient.name || 'N/A';
            document.getElementById('ui-dob').innerText = dashboardData.patient.dob || 'N/A';
            document.getElementById('ui-hn').innerText = dashboardData.patient.hn || 'N/A';
            document.getElementById('ui-doc').innerText = dashboardData.patient.doctor || 'N/A';
            document.title = "PGx Dashboard - " + (dashboardData.patient.name || 'Patient');

            // 2. Build Drug Grid and Modals
            const contentDiv = document.getElementById('dashboard-content');
            if (!dashboardData.drugs || dashboardData.drugs.length === 0) {
                contentDiv.innerHTML = "<p style='color:red;'>No drug data was found.</p>";
            } else {
                const groupedData = {};
                dashboardData.drugs.forEach(item => {
                    if (!groupedData[item.category]) groupedData[item.category] = [];
                    groupedData[item.category].push(item);
                });

                for (const [category, drugs] of Object.entries(groupedData)) {
                    const header = document.createElement('h3');
                    header.className = 'category-header';
                    header.innerText = category;
                    contentDiv.appendChild(header);

                    const grid = document.createElement('div');
                    grid.className = 'grid';

                    drugs.forEach(item => {
                        const tile = document.createElement('div');
                        tile.className = 'drug-tile';
                        tile.innerText = item.drug;

                        if (item.alertColor) {
                            tile.style.setProperty('--alert-color', item.alertColor);
                            tile.classList.add('dynamic-alert');
                        }

                        // CLICK TO OPEN MODAL
                        tile.addEventListener('click', () => {
                            const themeColor = item.alertColor ? item.alertColor : '#1f3864';
                            modalContent.style.borderTopColor = themeColor;
                            
                            modalBody.innerHTML = `
                                <div class="modal-title" style="color: ${themeColor};">${item.drug}</div>
                                <div class="modal-section">
                                    <div class="modal-label">Genotype / Phenotype</div>
                                    <div class="modal-data">${item.genoPheno}</div>
                                </div>
                                <div class="modal-section" style="margin-top: 20px;">
                                    <div class="modal-label">Detail / Recommendation</div>
                                    <div class="modal-recommendation" style="border-left-color: ${themeColor};">${item.recommendation}</div>
                                </div>
                                <div class="modal-section" style="margin-top: 20px;">
                                    <div class="modal-label">Tier / CPIC Level</div>
                                    <div class="modal-data" style="font-weight:bold; color: #555;">${item.cpic || 'N/A'}</div>
                                </div>
                            `;
                            modalOverlay.classList.add('active');
                        });

                        grid.appendChild(tile);
                    });
                    contentDiv.appendChild(grid);
                }
            }

            // 3. Build Summary Table
            if (dashboardData.summary && dashboardData.summary.length > 0) {
                document.getElementById('summary-section').style.display = 'block';
                const summaryTbody = document.getElementById('summary-tbody');
                dashboardData.summary.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="font-weight: bold; color: #1f3864;">${item.gene}</td>
                        <td>${item.genotype}</td>
                        <td>${item.phenotype}</td>
                    `;
                    summaryTbody.appendChild(tr);
                });
            }
        });
    </script>
